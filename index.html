<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>No Stress, Just Vibing 😎</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
  canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .screen { pointer-events: all; text-align: center; color: white; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); padding: 20px; }
  .screen.hidden { display: none !important; }
  .game-title { font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif; font-size: clamp(28px, 7vw, 58px); font-weight: 900; color: #FFE566; text-shadow: 3px 3px 0 #c97000, 6px 6px 0 rgba(0,0,0,0.3); letter-spacing: 2px; line-height: 1.1; margin-bottom: 4px; }
  .game-subtitle { font-family: Arial, sans-serif; font-size: clamp(12px, 2.8vw, 18px); color: #b8e4ff; margin-bottom: clamp(14px, 3vh, 28px); letter-spacing: 1px; }
  .avatar-label { font-size: clamp(12px, 2.8vw, 16px); color: rgba(255,255,255,0.8); margin-bottom: 10px; font-family: Arial, sans-serif; }
  .avatar-row { display: flex; gap: clamp(10px, 2.5vw, 22px); margin-bottom: clamp(14px, 3vh, 26px); flex-wrap: wrap; justify-content: center; }
  .avatar-card { cursor: pointer; border: 3px solid rgba(255,255,255,0.2); border-radius: 18px; padding: clamp(8px,2vw,14px) clamp(12px,2.5vw,20px); background: rgba(255,255,255,0.08); color: white; font-family: Arial, sans-serif; font-size: clamp(11px,2.2vw,14px); font-weight: bold; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 7px; min-width: clamp(100px,25vw,135px); user-select: none; }
  .avatar-card:hover, .avatar-card:active { background: rgba(255,255,255,0.18); transform: scale(1.04); }
  .avatar-card.selected { border-color: #FFE566; background: rgba(255,229,102,0.18); }
  .avatar-img-wrap { width: clamp(52px,13vw,75px); height: clamp(52px,13vw,75px); border-radius: 50%; overflow: hidden; border: 3px solid #FFE566; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: clamp(20px,5.5vw,30px); }
  .avatar-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-img-wrap.dashed { border: 3px dashed rgba(255,255,255,0.4); }
  .play-btn { cursor: pointer; background: linear-gradient(135deg, #FFE566 0%, #FF8C00 100%); color: #1a1a1a; border: none; border-radius: 60px; padding: clamp(12px,2.8vh,17px) clamp(32px,9vw,55px); font-size: clamp(17px,4vw,26px); font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; letter-spacing: 1px; transition: all 0.18s ease; box-shadow: 0 6px 22px rgba(255,140,0,0.45); margin-top: 4px; user-select: none; }
  .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(255,140,0,0.65); }
  .play-btn:active { transform: scale(0.97); }
  .tap-hint { font-size: clamp(10px,2.2vw,14px); color: rgba(255,255,255,0.6); margin-top: 12px; font-family: Arial, sans-serif; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  #livescore { position: absolute; top: clamp(14px,3.5vh,32px); left: 50%; transform: translateX(-50%); font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(44px,12vw,88px); font-weight: 900; color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.4); pointer-events: none; z-index: 10; }
  #livescore.hidden { display: none !important; }
  .over-title { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(32px,8vw,64px); font-weight: 900; color: #ff6b6b; text-shadow: 3px 3px 0 #7a0000; margin-bottom: 8px; }
  .over-msg { font-size: clamp(13px,2.8vw,19px); color: #FFE566; font-style: italic; margin-bottom: clamp(12px,3.5vh,24px); font-family: Arial, sans-serif; max-width: min(400px,88vw); line-height: 1.4; }
  .scores-row { display: flex; gap: clamp(12px,3.5vw,28px); margin-bottom: clamp(12px,3.5vh,24px); flex-wrap: wrap; justify-content: center; }
  .score-card { background: rgba(255,255,255,0.1); border-radius: 14px; padding: clamp(9px,2.2vh,15px) clamp(16px,4.5vw,26px); min-width: clamp(95px,23vw,125px); }
  .score-lbl { font-size: clamp(9px,1.8vw,12px); color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-family: Arial, sans-serif; }
  .score-num { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(26px,7vw,42px); font-weight: 900; color: #FFE566; }
  .score-num.green { color: #7cff6b; }
  .new-badge { background: #7cff6b; color: #003300; font-size: 10px; font-weight: 900; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-left: 5px; vertical-align: middle; font-family: Arial, sans-serif; }
  .btn-row { display: flex; gap: clamp(8px,2.5vw,16px); flex-wrap: wrap; justify-content: center; }
  .sec-btn { cursor: pointer; background: rgba(255,255,255,0.12); color: white; border: 2px solid rgba(255,255,255,0.3); border-radius: 50px; padding: clamp(9px,2.2vh,13px) clamp(20px,5.5vw,32px); font-size: clamp(12px,2.8vw,16px); font-weight: bold; font-family: Arial, sans-serif; transition: all 0.18s ease; user-select: none; }
  .sec-btn:hover, .sec-btn:active { background: rgba(255,255,255,0.22); }
  #fileInput { display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="livescore" class="hidden">0</div>
  <div id="startScreen" class="screen">
    <div class="game-title">NO STRESS</div>
    <div class="game-title" style="font-size:clamp(20px,4.5vw,36px);margin-top:-8px;margin-bottom:10px;">JUST VIBING 😎</div>
    <div class="game-subtitle">The world's chillest flappy game</div>
    <div class="avatar-label">Pick your flying head 👇</div>
    <div class="avatar-row">
      <div class="avatar-card selected" id="defaultCard" onclick="pickDefault()">
        <div class="avatar-img-wrap"><img id="defaultThumb" src="" alt="chill cat"></div>
        <span>Chill Cat 😎</span>
      </div>
      <div class="avatar-card" id="selfieCard" onclick="triggerSelfie()">
        <div class="avatar-img-wrap dashed" id="selfieWrap">📷</div>
        <span id="selfieLabel">Your Face 🤳</span>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="onSelfieLoad(event)">
    <button class="play-btn" onclick="startGame()">TAP TO FLAP! 🐦</button>
    <div class="tap-hint">Tap · Click · Space to jump</div>
  </div>
  <div id="overScreen" class="screen hidden">
    <div class="over-title" id="overTitle">SPLAT! 💥</div>
    <div class="over-msg" id="overMsg">lol you noob 😂</div>
    <div class="scores-row">
      <div class="score-card">
        <div class="score-lbl">Score</div>
        <div class="score-num green" id="curScore">0</div>
      </div>
      <div class="score-card">
        <div class="score-lbl">Best <span class="new-badge hidden" id="newBadge">NEW!</span></div>
        <div class="score-num" id="hiScore">0</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="play-btn" style="margin-top:0" onclick="startGame()">Again! 🔁</button>
      <button class="sec-btn" onclick="goMenu()">Change Avatar 🔄</button>
    </div>
  </div>
</div>

let catCircle = null, selfieCircle = null, currentAvatar = 'cat';

function makeCircular(img) {
  const c = document.createElement('canvas');
  c.width = c.height = 160;
  const x = c.getContext('2d');
  x.save();
  x.beginPath();
  x.arc(80, 80, 80, 0, Math.PI * 2);
  x.clip();
  const iw = img.naturalWidth || img.width || 160;
  const ih = img.naturalHeight || img.height || 160;
  const crop = Math.min(iw, ih) * 0.75;
  const sx = iw / 2 - crop / 2;
  const sy = ih * 0.04;
  x.drawImage(img, sx, sy, crop, Math.max(crop, 1), 0, 0, 160, 160);
  x.restore();
  return c;
}

const catImg = new Image();
catImg.onload = () => { catCircle = makeCircular(catImg); document.getElementById('defaultThumb').src = catCircle.toDataURL(); };
catImg.src = CAT_SRC;

function triggerSelfie() { document.getElementById('fileInput').click(); }
function pickDefault() {
  currentAvatar = 'cat';
  document.getElementById('defaultCard').classList.add('selected');
  document.getElementById('selfieCard').classList.remove('selected');
}
function onSelfieLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      selfieCircle = makeCircular(img);
      const wrap = document.getElementById('selfieWrap');
      wrap.innerHTML = '';
      const preview = document.createElement('img');
      preview.src = selfieCircle.toDataURL();
      wrap.appendChild(preview);
      wrap.classList.remove('dashed');
      document.getElementById('selfieLabel').textContent = 'Your Face 🤳 ✅';
      currentAvatar = 'selfie';
      document.getElementById('selfieCard').classList.add('selected');
      document.getElementById('defaultCard').classList.remove('selected');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function getAv() { return (currentAvatar === 'selfie' && selfieCircle) ? selfieCircle : catCircle; }

// ── GAME STATE ────────────────────────────────────────────────────
let state = 'menu', raf;
let score, best = 0, speed, pipeTimer, frame;
let bird, pipes, particles;
let clouds = [], bgBirds = [], bgFaces = [];

function birdRadius() { return Math.max(22, Math.min(W, H) * 0.07); }

function initClouds() {
  clouds = [];
  for (let i = 0; i < 7; i++) clouds.push({ x: Math.random()*W, y: 30+Math.random()*H*0.32, spd: 0.25+Math.random()*0.4, sc: 0.5+Math.random()*0.85 });
}
function initBgBirds() {
  bgBirds = [];
  for (let i = 0; i < 5; i++) bgBirds.push({ x: Math.random()*W, y: 50+Math.random()*H*0.38, spd: 0.7+Math.random()*1.3, wp: Math.random()*Math.PI*2, sz: 5+Math.random()*7 });
}
function genBgFaces() {
  bgFaces = [];
  for (let i = 0; i < 18; i++) bgFaces.push({ x: Math.random()*W, y: Math.random()*H, sz: 26+Math.random()*75, angle: Math.random()*Math.PI*2, alpha: 0.05+Math.random()*0.14, vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.35 });
}

function initGame() {
  const r = birdRadius();
  bird = { x: W*0.22, y: H*0.45, vy: 0, r, angle: 0, wobble: 0, dead: false, deathTick: 0 };
  pipes = []; particles = [];
  score = 0;
  // slower start speed — easier for beginners
  speed = Math.max(1.8, Math.min(W, H) * 0.004 + 1.2);
  pipeTimer = 0; frame = 0;
  genBgFaces();
}

// ── DRAW BG ───────────────────────────────────────────────────────
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H*0.85);
  g.addColorStop(0, '#5ab0e8'); g.addColorStop(0.55, '#a8d8f0'); g.addColorStop(1, '#d8eefc');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function drawCloud(x, y, sc) {
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.arc(x,        y,        Math.max(1,28*sc), 0, Math.PI*2);
  ctx.arc(x+30*sc,  y-11*sc,  Math.max(1,22*sc), 0, Math.PI*2);
  ctx.arc(x+56*sc,  y,        Math.max(1,26*sc), 0, Math.PI*2);
  ctx.arc(x+20*sc,  y+14*sc,  Math.max(1,19*sc), 0, Math.PI*2);
  ctx.arc(x+46*sc,  y+12*sc,  Math.max(1,17*sc), 0, Math.PI*2);
  ctx.fill();
}
function updateClouds() {
  clouds.forEach(c => { c.x -= c.spd; if (c.x < -130) { c.x = W+130; c.y = 30+Math.random()*H*0.32; } drawCloud(c.x, c.y, c.sc); });
}
function drawBgBird(x, y, wp, sz) {
  ctx.strokeStyle = 'rgba(60,60,80,0.55)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  const wg = Math.sin(wp)*sz*0.55;
  ctx.moveTo(x-sz, y+wg); ctx.quadraticCurveTo(x, y, x+sz, y+wg);
  ctx.stroke();
}
function updateBgBirds() {
  bgBirds.forEach(b => { b.x -= b.spd; b.wp += 0.13; if (b.x < -30) { b.x = W+30; b.y = 50+Math.random()*H*0.38; } drawBgBird(b.x, b.y, b.wp, b.sz); });
}
function updateBgFaces() {
  const av = getAv(); if (!av) return;
  bgFaces.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    if (f.x < -100) f.x = W+100; if (f.x > W+100) f.x = -100;
    if (f.y < -100) f.y = H+100; if (f.y > H+100) f.y = -100;
    ctx.save();
    ctx.globalAlpha = f.alpha;
    ctx.translate(f.x, f.y); ctx.rotate(f.angle);
    const sz = Math.max(1, f.sz);
    ctx.drawImage(av, -sz/2, -sz/2, sz, sz);
    ctx.restore();
  });
}
function groundY() { return H * 0.88; }
function drawGround() {
  const gy = groundY();
  ctx.fillStyle = '#4a7f2e'; ctx.fillRect(0, gy, W, 10);
  ctx.fillStyle = '#6aba3a'; ctx.fillRect(0, gy+10, W, 18);
  const dg = ctx.createLinearGradient(0, gy+28, 0, H);
  dg.addColorStop(0,'#8B4513'); dg.addColorStop(1,'#6b3410');
  ctx.fillStyle = dg; ctx.fillRect(0, gy+28, W, H-gy-28);
}
function drawBg() { drawSky(); updateClouds(); updateBgBirds(); updateBgFaces(); drawGround(); }

// ── PIPES ─────────────────────────────────────────────────────────
function pipeW() { return Math.max(48, Math.min(75, W * 0.12)); }

// EASY MODE: very wide gap at start, shrinks slowly
function pipeGap() {
  const minGap = 165;
  const startGap = Math.min(H * 0.42, 240); // big gap relative to screen
  return Math.max(minGap, startGap - score * 3.5);
}

function spawnPipe() {
  const pg = pipeGap();
  const minT = H * 0.1;
  const maxT = H * 0.55;
  pipes.push({ x: W + pipeW(), topH: minT + Math.random()*(maxT-minT), gap: pg, scored: false });
}
function drawPipe(p) {
  const pw = pipeW(), capW = pw+12, capH = 22;
  const g = ctx.createLinearGradient(p.x,0,p.x+pw,0);
  g.addColorStop(0,'#4CAF2A'); g.addColorStop(0.4,'#6edc42'); g.addColorStop(1,'#357a1c');
  ctx.fillStyle = g;
  ctx.fillRect(p.x, 0, pw, p.topH);
  ctx.fillRect(p.x, p.topH+p.gap, pw, H);
  ctx.fillStyle = '#3d9a1f';
  ctx.fillRect(p.x-6, p.topH-capH, capW, capH);
  ctx.fillRect(p.x-6, p.topH+p.gap, capW, capH);
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.fillRect(p.x+7, 0, 9, p.topH);
  ctx.fillRect(p.x+7, p.topH+p.gap, 9, H);
}

// ── BIRD ──────────────────────────────────────────────────────────
function drawBird() {
  const b = bird;
  const r = Math.max(10, b.r);
  ctx.save();
  ctx.translate(b.x, b.y);
  const targetAngle = Math.max(-0.5, Math.min(Math.PI/1.9, b.vy * 0.06));
  b.angle += (targetAngle - b.angle) * 0.2;
  b.wobble += 0.18;
  const wobble = b.dead ? 0 : Math.sin(b.wobble) * 0.08;
  ctx.rotate(b.angle + wobble);
  const av = getAv();
  if (av) {
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(av, -r, -r, r*2, r*2);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = '#FFE566';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── PARTICLES ─────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const cols = ['#FFE566','#FF6B6B','#7CFF6B','#B8E4FF','#FF8C00','#ff00ff','#00ffff'];
  for (let i = 0; i < 22; i++) {
    const ang = Math.random()*Math.PI*2, spd = 2+Math.random()*8;
    particles.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd-3, life: 1, col: cols[Math.floor(Math.random()*cols.length)], sz: 4+Math.random()*10 });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.026;
    ctx.globalAlpha = p.life; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.sz*p.life), 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ── COLLISION ─────────────────────────────────────────────────────
function collides() {
  const b = bird, r = Math.max(10, b.r) * 0.72, pw = pipeW();
  if (b.y + r >= groundY()) return true;
  if (b.y - r <= 0) return true;
  for (const p of pipes) {
    if (b.x+r > p.x && b.x-r < p.x+pw) {
      if (b.y-r < p.topH || b.y+r > p.topH+p.gap) return true;
    }
  }
  return false;
}

// ── JUMP ──────────────────────────────────────────────────────────
function jump() {
  if (state !== 'playing' || bird.dead) return;
  // comfortable jump — not too high, not too low
  bird.vy = -H * 0.006;
  playJump();
}

// ── FUNNY MESSAGES ────────────────────────────────────────────────
const TITLES = ['SPLAT! 💥','BONK! 🪨','YIKES! 😬','OOPS! 😂','RIP! 💀','BRUH! 😤','WELP! 🤷','DEAD! 🪦','NOPE! 🙅'];
const MSGS = [
  'lol you noob 😂',
  'bro really thought he was built for this 💀',
  'the pipe didn\'t move. YOU moved. think about it 🧠',
  'skill issue detected 🔍',
  'even the cat is embarrassed rn 😒😎',
  'bro said "I got this" and then... didn\'t 🤣',
  'L + ratio + you hit a pipe 💅',
  'the gap was literally RIGHT THERE 😭😭',
  'your ancestors are watching. they\'re not proud 👀',
  'certified pipe magnet 🧲',
  'bro touched grass... and a pipe 🌿💥',
  'deleted 💀 by a stationary object',
  'the pipe didn\'t even try 😂',
  'GG EZ (it was not EZ for you) 😹',
  'imagine losing to a plant 🌿😂',
  'this run is going in the hall of shame 🏆',
  'you played yourself. literally. 🎭',
  'the pipe said: nope, not today 🚫',
  'even my grandma passes 4 pipes 👵😂',
  'are you even trying bro 💀',
];
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── GAME LOOP ─────────────────────────────────────────────────────
function loop() {
  if (state !== 'playing') return;
  raf = requestAnimationFrame(loop);
  frame++;
  drawBg();

  // pipes spawn less frequently early on
  const interval = Math.max(58, 115 - score*2);
  if (++pipeTimer >= interval) { spawnPipe(); pipeTimer = 0; }

  pipes = pipes.filter(p => p.x > -pipeW()-20);
  pipes.forEach(p => {
    if (!bird.dead) p.x -= speed;
    drawPipe(p);
    if (!p.scored && p.x+pipeW() < bird.x) {
      p.scored = true; score++;
      // speed increases slowly — not punishing
      speed = Math.max(1.8, Math.min(W,H)*0.004+1.2 + score*0.07);
      document.getElementById('livescore').textContent = score;
    }
  });

  drawGround();

  if (!bird.dead) {
    // gentle gravity — easy to control
    bird.vy += H * 0.00039;
    bird.y  += bird.vy;
    if (collides()) {
      bird.dead = true;
      stopMusic();
      playScream();
      setTimeout(playCrash, 320);
      spawnParticles(bird.x, bird.y);
    }
  } else {
    bird.deathTick++;
    bird.vy += H * 0.00048;
    bird.y  += bird.vy;
    bird.angle += 0.16;
  }

  drawBird();
  updateParticles();
  if (bird.dead && bird.deathTick > 70) showOver();
}

function menuLoop() {
  if (state !== 'menu') return;
  requestAnimationFrame(menuLoop);
  drawSky(); updateClouds(); updateBgBirds(); updateBgFaces(); drawGround();
}

// ── SCREENS ───────────────────────────────────────────────────────
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  const ls = document.getElementById('livescore');
  ls.classList.remove('hidden'); ls.textContent = '0';
  initGame();
  state = 'playing';
  cancelAnimationFrame(raf);
  startMusic();
  loop();
}
function showOver() {
  state = 'over';
  cancelAnimationFrame(raf);
  if (score > best) { best = score; document.getElementById('newBadge').classList.remove('hidden'); }
  else { document.getElementById('newBadge').classList.add('hidden'); }
  document.getElementById('curScore').textContent = score;
  document.getElementById('hiScore').textContent = best;
  document.getElementById('overTitle').textContent = rand(TITLES);
  document.getElementById('overMsg').textContent = rand(MSGS);
  document.getElementById('livescore').classList.add('hidden');
  document.getElementById('overScreen').classList.remove('hidden');
}
function goMenu() {
  state = 'menu';
  stopMusic();
  cancelAnimationFrame(raf);
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('livescore').classList.add('hidden');
  genBgFaces();
  menuLoop();
}

// ── INPUT ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); jump(); }, { passive: false });
document.addEventListener('touchstart', e => {
  if (state === 'playing') { e.preventDefault(); jump(); }
}, { passive: false });

// ── INIT ──────────────────────────────────────────────────────────
initClouds(); initBgBirds(); genBgFaces();
state = 'menu';
menuLoop();
</script>
